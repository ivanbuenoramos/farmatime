name: iOS Release (App Store Connect)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build-number:
        description: "Build number (dejar vacío para autogenerarlo)"
        required: false
        type: string

concurrency:
  group: ios-release
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build IPA and upload to App Store Connect
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Apple exige compilar con el SDK de iOS 26 desde abril de 2026
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "Xcode 26 no encontrado en el runner. Disponibles:"
            ls /Applications | grep -i xcode
            exit 1
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: stable
          cache: true

      - name: Install signing certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the distribution certificate
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install the provisioning profile
          mkdir -p ~/Library/Developer/Xcode/UserProvisioning\ Profiles ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -o - -)
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
          cp "$PP_PATH" ~/Library/Developer/Xcode/UserProvisioning\ Profiles/"$PP_UUID".mobileprovision

      - name: Install dependencies
        run: flutter pub get

      - name: Build IPA
        run: |
          # Build number único y ascendente: manual si se indica,
          # autogenerado (1000 + nº de ejecución) en pushes a main
          BUILD_NUMBER="${{ inputs.build-number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER=$((1000 + ${{ github.run_number }}))
          fi
          echo "Build number: $BUILD_NUMBER"
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-number="$BUILD_NUMBER"

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # altool busca la clave .p8 en ./private_keys
          mkdir -p ./private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            -o ./private_keys/AuthKey_"$APP_STORE_CONNECT_API_KEY_ID".p8

          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          echo "Subiendo $IPA_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: farmatime-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore

      - name: Clean up keychain and secrets
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -rf ./private_keys
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision || true
